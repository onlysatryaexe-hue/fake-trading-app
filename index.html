<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RR MARKETS - TRADING</title>
    <style>
        :root {
            --bg: #121212;
            --gold: #c5a059;
            --green: #00c853;
            --red: #ff1744;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: white; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; padding: 15px;
            background: #1a1a1a;
            text-align: center; border-bottom: 1px solid #333;
        }

        .portfolio-box {
            width: 90%; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 15px;
            padding: 20px; margin: 20px 0; text-align: center;
        }

        .bal-amount { font-size: 24px; font-weight: bold; color: var(--gold); margin: 10px 0; }

        .chart-area {
            width: 95%; background: #000; border-radius: 10px;
            padding: 10px; margin-bottom: 20px; border: 1px solid #222;
        }

        #trading-chart { width: 100%; height: 150px; }

        .controls {
            width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .input-bet {
            grid-column: span 2; background: #222; border: 1px solid var(--gold);
            color: var(--gold); padding: 15px; border-radius: 10px;
            text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px;
        }

        .btn {
            padding: 15px; border-radius: 10px; border: none;
            color: white; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        .btn-buy { background: var(--green); }
        .btn-sell { background: var(--red); }
        .btn-sync { 
            grid-column: span 2; background: none; 
            border: 1px solid var(--gold); color: var(--gold); 
            margin-top: 10px; padding: 10px; font-size: 12px;
        }

        /* Pop up hasil */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <div style="color:var(--gold); font-size:10px; letter-spacing:2px">RR MARKETS GLOBAL</div>
</header>

<div class="portfolio-box">
    <div style="font-size:12px; opacity:0.6">Trading Balance</div>
    <div id="display-balance" class="bal-amount">Rp. 0</div>
    <div style="display:flex; gap:10px; justify-content:center;">
        <button onclick="toggleSensor()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px; font-size:10px;">SENSOR</button>
    </div>
</div>

<div class="chart-area">
    <canvas id="trading-chart"></canvas>
</div>

<div class="controls">
    <input type="text" id="bet-input" class="input-bet" placeholder="0" oninput="autoDot(this)">
    <button class="btn btn-buy" onclick="startTrade('BUY')">BUY</button>
    <button class="btn btn-sell" onclick="startTrade('SELL')">SELL</button>
    <button class="btn-sync" onclick="syncBalance()">CEK TRANSFERAN</button>
</div>

<div id="result-screen" class="overlay">
    <h1 id="res-status"></h1>
    <h2 id="res-amount"></h2>
    <button class="btn" style="background:var(--gold); width:150px" onclick="closeResult()">OK</button>
</div>

<script>
    let tradingBalance = parseFloat(localStorage.getItem('trading_balance')) || 0;
    let isSensored = false;

    // Fungsi Titik Otomatis
    function autoDot(el) {
        let val = el.value.replace(/\D/g, "");
        if (val === "") { el.value = ""; return; }
        el.value = Number(val).toLocaleString('id-ID');
    }

    function syncBalance() {
        tradingBalance = parseFloat(localStorage.getItem('trading_balance')) || 0;
        updateUI();
        alert("Saldo Diperbarui!");
    }

    function updateUI() {
        const el = document.getElementById('display-balance');
        el.innerText = isSensored ? "Rp. ******" : "Rp. " + tradingBalance.toLocaleString('id-ID');
        localStorage.setItem('trading_balance', tradingBalance);
    }

    function toggleSensor() { isSensored = !isSensored; updateUI(); }

    function startTrade(type) {
        const rawValue = document.getElementById('bet-input').value.replace(/\./g, "");
        const bet = parseFloat(rawValue);

        if (!bet || bet > tradingBalance) return alert("Saldo tidak cukup!");

        tradingBalance -= bet;
        updateUI();

        setTimeout(() => {
            const isWin = Math.random() > 0.5;
            const mult = (Math.random() * 3 + 2).toFixed(1);
            const screen = document.getElementById('result-screen');
            
            if (isWin) {
                const profit = Math.floor(bet * mult);
                tradingBalance += profit;
                document.getElementById('res-status').innerText = "PROFIT!";
                document.getElementById('res-status').style.color = "#00c853";
                document.getElementById('res-amount').innerText = "+ Rp. " + profit.toLocaleString('id-ID');
            } else {
                document.getElementById('res-status').innerText = "LOSS";
                document.getElementById('res-status').style.color = "#ff1744";
                document.getElementById('res-amount').innerText = "- Rp. " + bet.toLocaleString('id-ID');
            }
            screen.style.display = "flex";
            updateUI();
        }, 1000);
    }

    function closeResult() {
        document.getElementById('result-screen').style.display = "none";
        document.getElementById('bet-input').value = "";
    }

    // Grafik sederhana
    const canvas = document.getElementById('trading-chart');
    const ctx = canvas.getContext('2d');
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#00c853";
        ctx.moveTo(0, 75);
        for(let i=0; i<20; i++) {
            ctx.lineTo(i*20, 75 + (Math.random()*40 - 20));
        }
        ctx.stroke();
    }
    setInterval(draw, 1000);

    window.onload = updateUI;
</script>

</body>
</html>
