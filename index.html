<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAKE TRANSFER - RR FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --rr: #ff6a00; --card: #1e1e1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .header-title { color: var(--rr); font-weight: 700; letter-spacing: 2px; font-size: 12px; }

        .portfolio-card { background: #1a1a1a; width: 90%; border-radius: 15px; padding: 20px; margin: 20px 0; border: 1px solid #333; }
        #balance-text { font-size: 24px; font-weight: 800; display: block; margin-top: 5px; }

        /* Menu Grid Fix */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px; }
        
        /* Button Style */
        .btn-rr { 
            background: var(--rr); color: white; border: none; padding: 15px 5px; 
            border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer;
            width: 100%; position: relative; z-index: 10;
        }
        .btn-outline { background: transparent; border: 2px solid var(--rr); color: var(--rr); }
        .btn-rr:active { background: #cc5500; transform: scale(0.95); }

        /* Form Style */
        .form-section { 
            width: 90%; background: var(--card); padding: 20px; 
            border-radius: 15px; margin-bottom: 20px; display: none; border: 1px solid #444;
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: #2a2a2a; 
            border: 1px solid #444; color: var(--rr); border-radius: 10px; 
            font-size: 20px; font-weight: bold; outline: none;
        }

        .history-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 5px 0; width: 90%; display: flex; justify-content: space-between; border-left: 4px solid var(--rr); }
    </style>
</head>
<body>

    <header><div class="header-title">UNLIMITED TRANSFER</div></header>

    <div class="portfolio-card">
        <span style="font-size:10px; opacity:0.5">TOTAL BALANCE</span>
        <span id="balance-text">Rp. ******</span>
        <button onclick="toggleSensor()" style="margin-top:10px; background:none; border:1px solid var(--rr); color:var(--rr); padding:5px; border-radius:5px; font-size:10px;">LIHAT SALDO</button>
    </div>

    <div class="menu-grid">
        <button class="btn-rr" onclick="showForm('bank-f')">BANK</button>
        <button class="btn-rr btn-outline" onclick="showForm('trade-f')">TRADING</button>
        <button class="btn-rr btn-outline" onclick="showForm('topup-f')">TOP UP</button>
    </div>

    <div id="topup-f" class="form-section">
        <h4 style="margin:0">Top Up Saldo</h4>
        <input type="text" id="in-topup" placeholder="0" oninput="autoDot(this)">
        <button class="btn-rr" onclick="doTopUp()">Konfirmasi</button>
    </div>

    <div id="trade-f" class="form-section">
        <h4 style="margin:0">Kirim ke Trading</h4>
        <input type="text" id="in-trade" placeholder="0" oninput="autoDot(this)">
        <button class="btn-rr" onclick="doTrade()">Kirim Sekarang</button>
    </div>

    <div id="bank-f" class="form-section">
        <h4 style="margin:0">Transfer Bank</h4>
        <input type="text" placeholder="No. Rekening">
        <input type="text" id="in-bank" placeholder="0" oninput="autoDot(this)">
        <button class="btn-rr" onclick="doBank()">Kirim Sekarang</button>
    </div>

    <div id="h-list" style="width:100%; display:flex; flex-direction:column; align-items:center;">
        <h5 style="color:var(--rr)">HISTORY</h5>
    </div>

    <script>
        // Data Global
        let mainBal = parseFloat(localStorage.getItem('main_balance')) || 1000000000;
        let sensor = true;

        // Fungsi Titik Otomatis (Like Calculator)
        function autoDot(el) {
            let val = el.value.replace(/\D/g, "");
            if(!val) { el.value = ""; return; }
            el.value = Number(val).toLocaleString('id-ID');
        }

        // Fungsi Ambil Angka Murni
        function raw(id) {
            return Number(document.getElementById(id).value.replace(/\./g, "")) || 0;
        }

        function updateDisplay() {
            const txt = document.getElementById('balance-text');
            txt.innerText = sensor ? "Rp. ******" : "Rp. " + mainBal.toLocaleString('id-ID');
            localStorage.setItem('main_balance', mainBal);
        }

        function toggleSensor() { sensor = !sensor; updateDisplay(); }

        function showForm(id) {
            // Sembunyikan semua dulu
            document.getElementById('topup-f').style.display = 'none';
            document.getElementById('trade-f').style.display = 'none';
            document.getElementById('bank-f').style.display = 'none';
            // Tampilkan yang dipilih
            document.getElementById(id).style.display = 'block';
        }

        function doTopUp() {
            let v = raw('in-topup');
            if(v > 0) mainBal = v;
            updateDisplay();
            document.getElementById('topup-f').style.display = 'none';
            alert("Berhasil Top Up!");
        }

        function doTrade() {
            let v = raw('in-trade');
            if(v <= 0 || v > mainBal) return alert("Saldo tidak cukup!");
            mainBal -= v;
            // Kirim ke LocalStorage Trading
            let tBal = parseFloat(localStorage.getItem('trading_balance')) || 0;
            localStorage.setItem('trading_balance', tBal + v);
            updateDisplay();
            addH("Deposit Trading", v);
            document.getElementById('trade-f').style.display = 'none';
            alert("Saldo terkirim ke Web Trading!");
        }

        function doBank() {
            let v = raw('in-bank');
            if(v <= 0 || v > mainBal) return alert("Saldo tidak cukup!");
            mainBal -= v;
            updateDisplay();
            addH("Bank Transfer", v);
            document.getElementById('bank-f').style.display = 'none';
            alert("Transfer Berhasil!");
        }

        function addH(t, a) {
            const list = document.getElementById('h-list');
            const d = document.createElement('div');
            d.className = 'history-item';
            d.innerHTML = `<span>${t}</span><b style="color:#ff4444">-${a.toLocaleString('id-ID')}</b>`;
            list.appendChild(d);
        }

        // Jalankan saat pertama kali buka
        window.onload = updateDisplay;
    </script>
</body>
</html>
